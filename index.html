<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战区数据</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <header class="header">
            <h1>战区数据</h1>
            <div class="controls">
                <select id="challengeSelect">
                    <option value="0">挑战0</option>
                    <option value="16" selected>挑战16</option>
                </select>
            </div>
            <div class="meta">
                <span id="members">参与人数: --</span>
                <span id="updatedAt">更新时间: --</span>
            </div>
        </header>

        <!-- 战区卡片区域 -->
        <section class="zones-container" id="zonesContainer">
            <!-- 动态生成 -->
        </section>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <!-- 排行榜 -->
        <section class="rankings">
            <h2>排行榜 <span class="top-label">TOP 100</span></h2>
            <div class="ranking-table" id="rankingTable">
                <!-- 动态生成 -->
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
